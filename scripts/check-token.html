<!DOCTYPE html>
<html>
<head>
  <title>Check JWT Token</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }
    .token-info {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 5px;
      margin: 10px 0;
      word-break: break-all;
    }
    .decoded {
      background: #e8f5e9;
      padding: 15px;
      border-radius: 5px;
      margin: 10px 0;
    }
    pre {
      white-space: pre-wrap;
    }
    button {
      background: #4CAF50;
      color: white;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 10px 5px 10px 0;
    }
    button:hover {
      background: #45a049;
    }
  </style>
</head>
<body>
  <h1>JWT Token Checker</h1>

  <button onclick="checkToken()">Check Stored Token</button>
  <button onclick="clearToken()">Clear Token & Logout</button>

  <div id="result"></div>

  <script>
    function decodeJWT(token) {
      try {
        const parts = token.split('.');
        if (parts.length !== 3) {
          return { error: 'Invalid JWT format' };
        }

        // Decode the payload (second part)
        const payload = parts[1];
        const decoded = JSON.parse(atob(payload.replace(/-/g, '+').replace(/_/g, '/')));
        return decoded;
      } catch (e) {
        return { error: 'Failed to decode token: ' + e.message };
      }
    }

    function checkToken() {
      const token = localStorage.getItem('fox_token');
      const user = localStorage.getItem('fox_user');
      const resultDiv = document.getElementById('result');

      if (!token) {
        resultDiv.innerHTML = '<div class="token-info"><strong>No token found in localStorage</strong><br>You need to log in first.</div>';
        return;
      }

      const decoded = decodeJWT(token);

      let html = '<h2>Stored Token:</h2>';
      html += '<div class="token-info">' + token + '</div>';

      html += '<h2>Decoded Token Payload:</h2>';
      html += '<div class="decoded"><pre>' + JSON.stringify(decoded, null, 2) + '</pre></div>';

      if (user) {
        html += '<h2>Stored User Info:</h2>';
        html += '<div class="token-info"><pre>' + JSON.stringify(JSON.parse(user), null, 2) + '</pre></div>';
      }

      // Check if token is expired
      if (decoded.exp) {
        const expDate = new Date(decoded.exp * 1000);
        const now = new Date();
        html += '<h2>Token Expiration:</h2>';
        html += '<div class="token-info">';
        html += '<strong>Expires:</strong> ' + expDate.toLocaleString() + '<br>';
        html += '<strong>Status:</strong> ' + (now > expDate ? '❌ EXPIRED' : '✅ Valid') + '<br>';
        html += '</div>';
      }

      // Check role
      if (decoded.role) {
        html += '<h2>Current Role in Token:</h2>';
        html += '<div class="token-info">';
        html += '<strong>Role:</strong> ' + decoded.role + '<br>';
        if (decoded.role !== 'host') {
          html += '<strong style="color: red;">⚠️ Warning: Your token has role "' + decoded.role + '" but you need "host" to create venues!</strong><br>';
          html += '<strong style="color: red;">Solution: Log out and log back in to get a fresh token with your updated role.</strong>';
        } else {
          html += '<strong style="color: green;">✅ Token has host role - you should be able to create venues!</strong>';
        }
        html += '</div>';
      }

      resultDiv.innerHTML = html;
    }

    function clearToken() {
      localStorage.removeItem('fox_token');
      localStorage.removeItem('fox_user');
      alert('Token and user info cleared! Please refresh the page and log in again.');
      location.reload();
    }

    // Auto-check on page load
    window.onload = checkToken;
  </script>
</body>
</html>
